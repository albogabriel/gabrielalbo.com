---
layout: default
---
<div id="project-content" class="row">
	<div class="large-12 columns page-container">
		<h1>{{ page.title }}</h1>
		<p class="meta post-date">{{ page.start-date }}{%if page.end-date != null %} - {% endif %} {{ page.end-date }}
		{% if page.project-website != null %}
			&nbsp;&nbsp;|&nbsp;&nbsp;<a href="{{ page.project-website }}" target="_blank">{{ page.project-website }}
		{% endif %}
		</a></p>

		<div class="post">
			{{ content }}
			<div class="back-to-index">
				<a href="{{ site.baseurl }}/portfolio" target="_self">&crarr;  	Back to all projects</a>
			</div>
		</div>
	</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
<script>
(function () {
  var images = document.querySelectorAll('.post .project-image:not(.project-image-hero)');
  images.forEach(function (img) {
    if (img.closest('a')) return;
    var a = document.createElement('a');
    a.href = img.src;
    a.className = 'glightbox';
    a.setAttribute('data-gallery', 'project');
    a.setAttribute('data-description', img.closest('figure, span, div')?.querySelector('figcaption')?.textContent?.trim() || '');
    img.parentNode.insertBefore(a, img);
    a.appendChild(img);
    img.style.cursor = 'zoom-in';
  });

  GLightbox({
    selector: '.glightbox',
    touchNavigation: true,
    keyboardNavigation: true,
    closeOnOutsideClick: true,
    loop: false,
    zoomable: false,
  });
})();
</script>
