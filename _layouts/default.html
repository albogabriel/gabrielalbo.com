<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <title>{{ page.title }}</title>
        <meta name="viewport" content="width=device-width">
        <meta property="og:image" content="http://www.gabrielalbo.com/assets/images/avatar-polygon-round.svg" />

        <base target='_blank'/>
        <link href="{{ site.baseurl }}/assets/images/favicon.ico" rel="icon" type="image/x-icon" />

        <link href="{{ site.baseurl }}/assets/images/favicon.ico" rel="apple-touch-icon" type="image/x-icon" />

        <link href="https://fonts.googleapis.com/css?family=Open+Sans|Dosis:400,500,800" rel="stylesheet" type="text/css" />

        <script>
          (function() {
            try {
              var saved = localStorage.getItem('theme');
              var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
              if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
              }
            } catch(e) {}
          })();
        </script>

        <script src="{{ site.baseurl }}/assets/javascript/analytics.js"></script>

        <!-- Cloudflare Web Analytics -->
        <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "659a5fb1ff7a4722b01ec7d1caa6ca45"}'></script>
        <!-- End Cloudflare Web Analytics -->

        <!-- GLightbox -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">

        <!-- syntax highlighting CSS -->
        <link rel="stylesheet" href="{{ site.baseurl }}/css/syntax.css">

        <!-- SCSS -->
        <link rel="stylesheet" href="{{ site.baseurl }}/css/screen.css?v={{ site.time | date: '%s' }}">

        <!-- Foundation -->
        <link rel="stylesheet" href="{{ site.baseurl }}/css/foundation.css">

    </head>
    <body>
       <header>
            <div class="row">
                <div class="large-6 medium-6 small-4 columns">
                    <h1 class="logo">
                        <span>
                            <a href="{{ site.baseurl }}/" target="_self">
                                <img id="logo-name" class="logo-fill" src="{{ site.baseurl }}/assets/images/logo_albo_home.svg" alt="Gabriel Albo">
                             </a>
                         </span>
                    </h1>
                </div>
                <div class="large-6 medium-6 small-8 columns">
                    <ul class="menu">
                        <li><a href="{{ site.baseurl }}/" target="_self"
                        {% if page.url == "/" or page.current-page == "index.html" %}
                        class="selected-item"
                        {% endif %}
                         >ABOUT</a></li>
                         <!-- <li><a href="{{ site.baseurl }}/blog" target="_self"
                        {% if page.url == "/blog/" or page.current-page == "blog-item" %}
                        class="selected-item"
                        {% endif %}
                         >BLOG</a></li> -->
                        <li><a href="{{ site.baseurl }}/portfolio/" target="_self"
                        {% if page.url == "/portfolio/" or page.current-page == "portfolio-item" %}
                        class="selected-item"
                        {% endif %}
                         >PORTFOLIO</a></li>
                        <li>
                          <button id="theme-toggle" role="switch" aria-checked="false" aria-label="Switch to dark mode">
                            <span class="tt-thumb"></span>
                            <span class="tt-icons">
                              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                            </span>
                          </button>
                        </li>
                    </ul>
                </div>
            </div>
        </header>
        <div class="main">
            {{ content }}
        </div>

        <script>
        // When the user scrolls down 50px from the top of the document, resize the header's font size
        window.onscroll = function() {scrollFunction()};

        function scrollFunction() {
          var scrolled = (window.pageYOffset || document.body.scrollTop || document.documentElement.scrollTop) > 40;
          if (window.innerWidth <= 600) {
            document.getElementById("logo-name").style.fontSize = scrolled ? "10px" : "20px";
          } else {
            document.getElementById("logo-name").style.fontSize = "";
          }
          document.querySelector("header").classList.toggle("header--scrolled", scrolled);
        }
        </script>

        <script src="{{ site.baseurl }}/assets/javascript/animations.js" defer></script>

        <script>
        (function() {
          var btn = document.getElementById('theme-toggle');

          function applyTheme(dark) {
            if (dark) {
              document.documentElement.setAttribute('data-theme', 'dark');
              btn.setAttribute('aria-checked', 'true');
              btn.setAttribute('aria-label', 'Switch to light mode');
            } else {
              document.documentElement.removeAttribute('data-theme');
              btn.setAttribute('aria-checked', 'false');
              btn.setAttribute('aria-label', 'Switch to dark mode');
            }
          }

          applyTheme(document.documentElement.getAttribute('data-theme') === 'dark');

          btn.addEventListener('click', function() {
            var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.classList.add('theme-transitioning');
            applyTheme(!isDark);
            try { localStorage.setItem('theme', isDark ? 'light' : 'dark'); } catch(e) {}
            setTimeout(function() {
              document.documentElement.classList.remove('theme-transitioning');
            }, 450);
          });
        })();
        </script>
    </body>
</html>
